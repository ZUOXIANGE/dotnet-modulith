name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run unit tests
        run: |
          dotnet test \
            tests/DotNetModulith.Modules.Orders.Tests/DotNetModulith.Modules.Orders.Tests.csproj \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=unit-tests.trx" \
            --results-directory TestResults \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByAttribute=ObsoleteAttribute,GeneratedCodeAttribute,CompilerGeneratedAttribute

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/
          retention-days: 7

  architecture-tests:
    name: Architecture Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run architecture tests
        run: |
          dotnet test \
            tests/DotNetModulith.ArchitectureTests/DotNetModulith.ArchitectureTests.csproj \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=architecture-tests.trx" \
            --results-directory TestResults

      - name: Upload architecture test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: architecture-test-results
          path: TestResults/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run integration tests
        run: |
          dotnet test \
            tests/DotNetModulith.IntegrationTests/DotNetModulith.IntegrationTests.csproj \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=integration-tests.trx" \
            --results-directory TestResults \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByAttribute=ObsoleteAttribute,GeneratedCodeAttribute,CompilerGeneratedAttribute

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: TestResults/
          retention-days: 7

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'pull_request'
    steps:
      - name: Download unit test results
        uses: actions/download-artifact@v8
        with:
          name: unit-test-results
          path: TestResults/unit

      - name: Download integration test results
        uses: actions/download-artifact@v8
        with:
          name: integration-test-results
          path: TestResults/integration

      - name: Find coverage files
        id: find_coverage
        run: |
          echo "Listing all downloaded files..."
          find TestResults -type f -name "*.xml" || true
          COVERAGE_FILES=$(find TestResults -type f -name "coverage.cobertura.xml" 2>/dev/null)
          if [ -z "$COVERAGE_FILES" ]; then
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
            echo "No coverage files found, skipping report generation"
          else
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
            echo "Found coverage files:"
            echo "$COVERAGE_FILES"
          fi

      - name: Setup .NET SDK
        if: steps.find_coverage.outputs.has_coverage == 'true'
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Merge coverage reports
        if: steps.find_coverage.outputs.has_coverage == 'true'
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.* || true
          reportgenerator \
            "-reports:TestResults/**/coverage.cobertura.xml" \
            "-targetdir:coveragereport" \
            "-reporttypes:MarkdownSummaryGithub;Cobertura" \
            "-assemblyfilters:+DotNetModulith.*;-*.Tests;-*.Migrations*" \
            "-classfilters:+DotNetModulith.*;-*Migrations*;-*Snapshot*"

      - name: Upload coverage report
        if: steps.find_coverage.outputs.has_coverage == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport/
          retention-days: 7

      - name: Add coverage summary
        if: steps.find_coverage.outputs.has_coverage == 'true'
        run: |
          if [ -f coveragereport/SummaryGithub.md ]; then
            cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi
